name: Main CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Validate Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node-backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Validate main module loads
        run: node --input-type=module --eval "import('./app.js').then(() => { console.log('OK'); process.exit(0) }).catch(e => { console.error(e.message); process.exit(1) })"
        env:
          PORT: 8000
          MONGODB_URI: mongodb://localhost:27017/cineprime_ci
          JWT_SECRET: ci-secret-key-at-least-32-characters-long
          JWT_EXPIRES_IN: 1d
          JWT_REFRESH_SECRET: ci-refresh-secret-key-at-least-32-chars
          JWT_REFRESH_EXPIRES_IN: 7d
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:3000
          INTERNAL_API_KEY: ci-internal-key

  frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E tests
        timeout-minutes: 5
        run: npm run e2e:ci

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Validate Docker Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cineprime-backend:ci node-backend

      - name: Build frontend image
        run: docker build --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:8000 -t cineprime-frontend:ci frontend
