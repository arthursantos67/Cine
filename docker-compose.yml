name: cineprime-api

services:
  backend:
    build:
      context: ./node-backend
      dockerfile: Dockerfile
    container_name: cineprime_backend
    volumes:
      - ./node-backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./node-backend/.env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cineprime_frontend
    command: sh -c "[ ! -d node_modules/.bin ] && npm ci; npm run dev -- -H 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_IMAGE_REMOTE_HOSTNAMES: image.tmdb.org,m.media-amazon.com,encrypted-tbn0.gstatic.com,img1.ibxk.com.br
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  frontend_next_cache:
