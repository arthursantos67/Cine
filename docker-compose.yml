name: cineprime-api

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cineprime_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cineprime_frontend
    command: sh -c "npm ci && npm run dev -- -H 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_IMAGE_REMOTE_HOSTNAMES: image.tmdb.org,m.media-amazon.com,encrypted-tbn0.gstatic.com,img1.ibxk.com.br
      TMDB_API_READ_TOKEN: ${TMDB_API_READ_TOKEN}
    depends_on:
      - backend

  db:
    image: postgres:17
    container_name: cineprime_db
    environment:
      POSTGRES_DB: cineprime
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cineprime_redis
    ports:
      - "6379:6379"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cineprime_celery
    command: celery -A cineprime_api worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - db
    env_file:
      - .env

volumes:
  postgres_data:
  frontend_node_modules:
